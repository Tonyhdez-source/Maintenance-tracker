<!DOCTYPE html>
<html lang="en">
<head>

<title>Facility Maintenance Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#21253a;--bg4:#2a2f45;
  --text:#e8eaf0;--text2:#9ba3bf;--text3:#5a6282;
  --border:#2e3450;--border2:#3a4060;
  --blue:#4f8ef7;--blue-dim:#1e2d52;--blue-text:#a3c0fd;
  --green:#3ecf6e;--green-dim:#0d2e1a;--green-text:#7ddfa4;
  --amber:#f5a623;--amber-dim:#2e1f05;--amber-text:#f5c87a;
  --red:#f45b5b;--red-dim:#2e0f0f;--red-text:#f79393;
  --gray-dim:#1e2130;--gray-text:#6b7494;
  --purple:#8b6cf7;--purple-dim:#1e1535;
  --radius:8px;--radius-lg:12px;--shadow:0 4px 24px rgba(0,0,0,.5);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:var(--text3)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-status{font-size:13px;color:var(--text3)}
.error-screen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
.error-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:480px;width:100%;text-align:center}
.error-card i{font-size:40px;color:var(--red);display:block;margin-bottom:12px}
.error-card h2{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}
.error-card p{font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:16px}
.error-card button{background:var(--blue);color:#fff;border:none;padding:9px 20px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
/* Passcode Screen */
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg);gap:0}
.lock-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px 28px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
.lock-icon{width:56px;height:56px;background:var(--blue-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;border:1px solid #2a3d70}
.lock-icon i{font-size:26px;color:var(--blue)}
.lock-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.lock-subtitle{font-size:12px;color:var(--text3);margin-bottom:24px}
.lock-dots{display:flex;justify-content:center;gap:12px;margin-bottom:28px;height:14px}
.lock-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.lock-dot.filled{background:var(--blue);border-color:var(--blue);transform:scale(1.1)}
.lock-dot.error{background:var(--red);border-color:var(--red)}
.lock-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.lock-key{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:14px 10px;font-size:18px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit;user-select:none}
.lock-key:hover{background:var(--bg4);border-color:var(--blue);color:var(--blue)}
.lock-key:active{transform:scale(.94)}
.lock-key.clear{font-size:13px;color:var(--text3);font-weight:500}
.lock-key.clear:hover{color:var(--red);border-color:var(--red);background:var(--red-dim)}
.lock-key.empty{visibility:hidden;cursor:default}
.lock-key.empty:hover{background:var(--bg3);border-color:var(--border2)}
.lock-err{font-size:12px;color:var(--red-text);min-height:18px;margin-top:2px}
.lock-shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.header-logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;color:var(--text)}
.header-logo i{font-size:21px;color:var(--blue)}
.header-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-blue{background:var(--blue-dim);color:var(--blue-text)}
.badge-red{background:var(--red-dim);color:var(--red-text)}
.badge-amber{background:var(--amber-dim);color:var(--amber-text)}
.badge-green{background:var(--green-dim);color:var(--green-text)}
.badge-gray{background:var(--gray-dim);color:var(--gray-text)}
.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.header-divider{width:1px;height:22px;background:var(--border);margin:0 2px}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border2)}
.sync-dot{width:7px;height:7px;border-radius:50%}
.sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.sync-dot.saving{background:var(--amber);animation:pulse .6s infinite}
.sync-dot.offline{background:var(--red)}
.sync-dot.setup{background:var(--gray-text)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Setup Screen */
.setup-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:20px}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:580px;width:100%;box-shadow:var(--shadow)}
.setup-title{font-size:20px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.setup-title i{color:var(--blue);font-size:22px}
.setup-subtitle{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.6}
.setup-steps{margin-bottom:24px}
.setup-step{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.step-num{background:var(--blue-dim);color:var(--blue-text);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-body{flex:1}
.step-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.step-desc{font-size:12px;color:var(--text3);line-height:1.6}
.step-desc a{color:var(--blue);text-decoration:none}
.step-desc a:hover{text-decoration:underline}
.step-desc code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--blue-text)}
.config-area{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-top:8px}
.config-area textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'Courier New',monospace;font-size:12px;resize:vertical;min-height:160px;line-height:1.5}
.config-area textarea:focus{outline:none}
.config-area textarea::placeholder{color:var(--text3)}
.setup-err{color:var(--red-text);font-size:12px;padding:8px 11px;background:var(--red-dim);border-radius:var(--radius);border:1px solid #5c1e1e;margin-bottom:12px}
.setup-footer{display:flex;justify-content:flex-end;gap:8px}
/* Layout */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:222px;min-width:222px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-label{padding:10px 14px 6px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-list{flex:1;overflow-y:auto}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.office-item{padding:9px 14px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:7px;font-size:13px;transition:background .12s;color:var(--text2)}
.office-item:hover{background:var(--bg3);color:var(--text)}
.office-item:hover .office-edit-btn{opacity:1}
.office-item.active{background:var(--bg4);border-left-color:var(--blue);color:var(--text);font-weight:600}
.office-name-wrap{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.office-edit-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;padding:2px 4px;border-radius:4px;line-height:1;transition:opacity .15s}
.office-edit-btn:hover{background:var(--border2);color:var(--text)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}.dot-green{background:var(--green)}.dot-gray{background:var(--text3)}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:22px 24px;background:var(--bg)}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.office-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.office-title{font-size:19px;font-weight:700;display:flex;align-items:center;gap:9px}
.office-title i{font-size:19px;color:var(--blue)}
.office-header-actions{margin-left:auto;display:flex;gap:8px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.stat-value{font-size:24px;font-weight:700}
.task-table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;padding:9px 13px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg3)}
td{padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.col-name{width:28%}.col-cat{width:11%}.col-freq{width:10%}.col-last{width:13%}.col-next{width:13%}.col-status{width:14%}.col-act{width:11%}
.task-name{font-weight:600;font-size:13px;margin-bottom:2px;color:var(--text)}
.task-notes{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-red{background:var(--red-dim);color:var(--red-text)}
.pill-amber{background:var(--amber-dim);color:var(--amber-text)}
.pill-green{background:var(--green-dim);color:var(--green-text)}
.pill-gray{background:var(--gray-dim);color:var(--gray-text)}
.pill-blue{background:var(--blue-dim);color:var(--blue-text)}
.row-actions{display:flex;gap:4px;align-items:center}
.icon-btn{background:none;border:1px solid transparent;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:6px;font-size:15px;line-height:1;transition:all .12s}
.icon-btn:hover{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.done-btn:hover{background:var(--green-dim)!important;color:var(--green)!important;border-color:#1e5c36!important}
.del-btn:hover{background:var(--red-dim)!important;color:var(--red)!important;border-color:#5c1e1e!important}
.btn{padding:7px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .12s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;font-weight:500}
.btn:hover{background:var(--bg4)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#3a7af0}
.btn-danger{background:var(--red-dim);color:var(--red-text);border-color:#5c1e1e}
.btn-danger:hover{background:#3d1212}
.btn-export{background:var(--green-dim);color:var(--green-text);border-color:#1e5c36}
.btn-export:hover{background:#0a2415}
.btn-import{background:var(--purple-dim);color:#b8a3fd;border-color:#3a2870}
.btn-import:hover{background:#160f2e}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}
.section-divider{padding:6px 13px;font-size:10px;font-weight:700;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.09em}
.freq-cell{display:flex;align-items:center;gap:5px}
.freq-input{width:56px;padding:3px 7px;border:1px solid var(--border2);border-radius:6px;font-size:12px;font-family:inherit;background:var(--bg3);color:var(--text)}
.freq-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,142,247,.2)}
.freq-unit{font-size:11px;color:var(--text3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;width:450px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.6)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.modal-title i{color:var(--blue);font-size:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--text)}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.15)}
textarea.form-input{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.err-msg{color:var(--red-text);font-size:12px;margin-bottom:10px;padding:8px 11px;background:var(--red-dim);border-radius:var(--radius);border:1px solid #5c1e1e}
.hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.4}
.inline-edit{border:1px solid var(--blue);border-radius:6px;padding:3px 8px;font-size:13px;font-family:inherit;background:var(--bg4);color:var(--text);width:130px}
.inline-edit:focus{outline:none;box-shadow:0 0 0 2px rgba(79,142,247,.25)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty i{font-size:44px;display:block;margin-bottom:12px;opacity:.2}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg4);color:var(--text);padding:11px 18px;border-radius:var(--radius);font-size:13px;z-index:999;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;border:1px solid var(--border2);animation:fadeIn .2s ease;font-weight:500}
.toast.success{background:var(--green-dim);color:var(--green-text);border-color:#1e5c36}
.toast.error{background:var(--red-dim);color:var(--red-text);border-color:#5c1e1e}
@keyframes fadeIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>

<script>
// Tracks which libraries loaded successfully
window._libs = { react: false, reactdom: false, firebase: false };

function updateStatus(msg) {
  var el = document.querySelector('.loading-status');
  if (el) el.textContent = msg;
}

function showFatalError() {
  document.getElementById('root').innerHTML =
    '<div class="error-screen">' +
    '<div class="error-card">' +
    '<i class="ti ti-wifi-off"></i>' +
    '<h2>Could Not Load Libraries</h2>' +
    '<p>The app tried 3 different servers to load React and Firebase but all failed.<br><br>' +
    'Please check your internet connection and try reloading. If the problem persists, try opening the app in an Incognito window.</p>' +
    '<button onclick="location.reload()">&#8635; Reload Page</button>' +
    '</div></div>';
}

// Load a script from a list of URLs, trying each one until success
function loadScriptWithFallbacks(urls, onSuccess, onFail) {
  var idx = 0;
  function tryNext() {
    if (idx >= urls.length) { onFail(); return; }
    var url = urls[idx++];
    var s = document.createElement('script');
    s.src = url;
    s.onload = onSuccess;
    s.onerror = function() { tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
}
</script>

<!-- Step 1: Load React with 3 CDN fallbacks -->

updateStatus('Loading React…');
loadScriptWithFallbacks([
  'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
  'https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js'
], function() {
  window._libs.react = true;
  updateStatus('Loading ReactDOM…');

  // Step 2: Load ReactDOM
  loadScriptWithFallbacks([
    'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
    'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js'
  ], function() {
    window._libs.reactdom = true;
    updateStatus('Loading Firebase…');

    // Step 3: Load Firebase App
    loadScriptWithFallbacks([
      'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js',
      'https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.js'
    ], function() {

      // Step 4: Load Firestore
      loadScriptWithFallbacks([
        'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js',
        'https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-firestore-compat.js'
      ], function() {
        window._libs.firebase = true;
        updateStatus('Starting app…');

        // Step 5: Load & run the app
        loadScriptWithFallbacks(
          ['app.js'],
          function() { /* app.js loaded */ },
          function() {
            // app.js not found — run inline
            if (window._runApp) window._runApp();
          }
        );
        // Always try inline as well
        setTimeout(function() {
          if (window._runApp) window._runApp();
        }, 300);

      }, function() { showFatalError(); });
    }, function() { showFatalError(); });

  }, function() { showFatalError(); });
}, function() { showFatalError(); });
</script>

      var a4=useState(null); var editOff=a4[0]; var setEditOff=a4[1];
      var a5=useState('');   var editName=a5[0];var setEditName=a5[1];
      var a6=useState(null); var toast=a6[0];   var setToast=a6[1];
      var a7=useState('setup');var syncSt=a7[0];var setSyncSt=a7[1];
      var a8=useState(isUnlocked()); var unlocked=a8[0]; var setUnlocked2=a8[1];
      var editRef=useRef(null);

      var unsubRef=useRef(null);

      useEffect(function(){
        var cfg=FIREBASE_CONFIG||getStoredCfg();
        if(cfg)boot(cfg);
      },[]);
      useEffect(function(){if(editOff&&editRef.current)editRef.current.focus();},[editOff]);

      // Show passcode screen if not unlocked
      if(!unlocked){
        return e(PasscodeScreen,{onUnlock:function(){setUnlocked2(true);}});
      }

      function boot(cfg){
        var ok=initFirebase(cfg);
        if(!ok){setSyncSt('offline');return;}
        storeCfg(cfg);setFbCfg(cfg);setSyncSt('live');
        if(unsubRef.current)unsubRef.current();
        unsubRef.current=firestoreListen(function(incoming){
          if(skipSnap.current){skipSnap.current=false;return;}
          setOffices(incoming);
          setSelId(function(prev){return prev||incoming[0].id;});
        });
        _db.collection(COLLECTION).doc(DOC_ID).get().then(function(snap){
          if(snap.exists&&snap.data()&&snap.data().offices&&snap.data().offices.length){
            var data=snap.data().offices;setOffices(data);setSelId(data[0].id);
          }else{
            var init=DEFAULT_NAMES.map(function(n,i){return makeOffice(n,i);});
            setOffices(init);setSelId(init[0].id);
            skipSnap.current=true;firestoreSave(init);
          }
        }).catch(function(){
          var local=loadLocal();
          if(local&&local.offices){setOffices(local.offices);setSelId(local.offices[0].id);}
          setSyncSt('offline');
        });
      }

      function toast2(msg,type){setToast({msg:msg,type:type||''});}

      function upd(fn){
        setOffices(function(prev){
          var next=fn(prev);
          saveLocal({offices:next});
          if(_db){setSyncSt('saving');skipSnap.current=true;firestoreSave(next);setTimeout(function(){setSyncSt('live');},1200);}
          return next;
        });
      }

      var sel=offices.find(function(o){return o.id===selId;});

      function markDone(oid,tid){upd(function(prev){return prev.map(function(o){
        if(o.id!==oid)return o;
        var rec=o.tasks[tid]||makeRec();var td=getAllTasks(o).find(function(t){return t.id===tid;});var n=getInterval(rec,td);
        return mg(o,{tasks:mg(o.tasks,{[tid]:mag(rec,{lastDone:todayStr(),nextDue:addDaysToToday(n)})})});
        function mag(a,b){return Object.assign({},a,b);}
      });});}
      function updateTaskRec(oid,tid,f){upd(function(prev){return prev.map(function(o){
        if(o.id!==oid)return o;return mg(o,{tasks:mg(o.tasks,{[tid]:mg(o.tasks[tid]||makeRec(),f)})});
      });});}
      function deleteTask(oid,tid){upd(function(prev){return prev.map(function(o){
        if(o.id!==oid)return o;var ctd=(o.customTaskDefs||[]).filter(function(t){return t.id!==tid;});var tasks=mg(o.tasks,{});delete tasks[tid];return mg(o,{customTaskDefs:ctd,tasks:tasks});
      });});}
      function addOffice(name){var o=makeOffice(name,Date.now());upd(function(p){return p.concat([o]);});setSelId(o.id);}
      function renameOffice(id,name){
        if(name&&name.trim())upd(function(p){return p.map(function(o){return o.id===id?mg(o,{name:name.trim()}):o;});});
        setEditOff(null);
      }
      function deleteOffice(id){upd(function(prev){var next=prev.filter(function(o){return o.id!==id;});if(selId===id)setSelId(next.length?next[0].id:null);return next;});}
      function addTask(oid,td){
        var tid='cust-'+Date.now();
        upd(function(prev){return prev.map(function(o){
          if(o.id!==oid)return o;return mg(o,{customTaskDefs:(o.customTaskDefs||[]).concat([mg(td,{id:tid})]),tasks:mg(o.tasks,{[tid]:makeRec()})});
        });});
      }
      function editTaskDef(oid,tid,f){upd(function(prev){return prev.map(function(o){
        if(o.id!==oid)return o;return mg(o,{customTaskDefs:(o.customTaskDefs||[]).map(function(t){return t.id===tid?mg(t,f):t;})});
      });});}

      function handleExport(){
        var blob=new Blob([JSON.stringify({offices:offices,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
        var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='maintenance_backup_'+todayStr()+'.json';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast2('Exported!','success');
      }
      function handleImportFile(ev){
        var file=ev.target.files[0];if(!file)return;
        var reader=new FileReader();
        reader.onload=function(e2){
          try{var data=JSON.parse(e2.target.result);if(!data.offices)throw new Error('Invalid file');
            if(!confirm('Replace all data with imported file?'))return;
            upd(function(){return data.offices;});if(data.offices.length)setSelId(data.offices[0].id);toast2('Imported!','success');
          }catch(ex){toast2('Import failed: '+ex.message,'error');}
        };reader.readAsText(file);ev.target.value='';
      }

      var syncLabel={live:'🟢 Live',saving:'⏳ Saving…',offline:'🔴 Offline',setup:'⚪ Not connected'}[syncSt]||syncSt;
      var gOver=0,gSoon=0,gOk=0;
      offices.forEach(function(o){getAllTasks(o).forEach(function(t){var s=getStatus(o.tasks[t.id]);if(s.cls==='pill-red')gOver++;else if(s.cls==='pill-amber')gSoon++;else if(s.cls==='pill-green')gOk++;});});

      if(fbCfg===null){
        return e('div',{className:'app'},
          e('div',{className:'header'},e('div',{className:'header-logo'},e('i',{className:'ti ti-tool'}),'Facility Maintenance Tracker')),
          e(SetupScreen,{onConnect:boot})
        );
      }

      return e('div',{className:'app'},
        e('div',{className:'header'},
          e('div',{className:'header-logo'},e('i',{className:'ti ti-tool'}),'Facility Maintenance Tracker'),
          e('div',{className:'header-badges'},
            e('span',{className:'badge badge-blue'}, offices.length+' Offices'),
            e('span',{className:'badge badge-red'},  gOver+' Overdue'),
            e('span',{className:'badge badge-amber'},gSoon+' Due Soon'),
            e('span',{className:'badge badge-green'},gOk+' On Track')
          ),
          e('div',{className:'header-actions'},
            e('div',{className:'sync-indicator'},e('span',{className:'sync-dot '+syncSt}),syncSt==='live'?'Live':syncSt==='saving'?'Saving…':syncSt==='offline'?'Offline':'—'),
            e('div',{className:'header-divider'}),
            e('button',{className:'btn btn-sm btn-export',onClick:handleExport},e('i',{className:'ti ti-download'}),'Export'),
            e('button',{className:'btn btn-sm btn-import',onClick:function(){if(fileRef.current)fileRef.current.click();}},e('i',{className:'ti ti-upload'}),'Import'),
            e('input',{ref:fileRef,type:'file',accept:'.json',style:{display:'none'},onChange:handleImportFile})
          )
        ),
        e('div',{className:'main'},
          e('div',{className:'sidebar'},
            e('div',{className:'sidebar-label'},'Offices'),
            e('div',{className:'sidebar-list'},offices.map(function(o){
              return e('div',{key:o.id,className:'office-item'+(selId===o.id?' active':''),onClick:function(){setSelId(o.id);}},
                editOff===o.id
                  ?e('input',{ref:editRef,className:'inline-edit',value:editName,
                      onChange:function(ev){setEditName(ev.target.value);},
                      onKeyDown:function(ev){if(ev.key==='Enter')renameOffice(o.id,editName);if(ev.key==='Escape')setEditOff(null);},
                      onBlur:function(){renameOffice(o.id,editName);},onClick:function(ev){ev.stopPropagation();}})
                  :e('span',{className:'office-name-wrap'},o.name),
                editOff!==o.id&&e('button',{className:'office-edit-btn',title:'Rename',
                  onClick:function(ev){ev.stopPropagation();setEditOff(o.id);setEditName(o.name);}},e('i',{className:'ti ti-pencil'})),
                e('span',{className:'dot '+officeDot(o)})
              );
            })),
            e('div',{className:'sidebar-footer'},e('button',{className:'btn btn-sm btn-block',onClick:function(){setModal({type:'add-office'});}},e('i',{className:'ti ti-plus'}),' Add Office'))
          ),
          e('div',{className:'content'},
            sel?e(OfficeDetail,{key:sel.id,office:sel,markDone:markDone,updateTaskRec:updateTaskRec,deleteTask:deleteTask,editTaskDef:editTaskDef,
                onAddTask:function(){setModal({type:'add-task',officeId:sel.id});},
                onEditTask:function(task){setModal({type:'edit-task',officeId:sel.id,task:task});},
                onDeleteOffice:function(){if(confirm('Delete '+sel.name+'?'))deleteOffice(sel.id);}})
              :e('div',{className:'empty'},e('i',{className:'ti ti-building'}),e('p',null,'Select an office'))
          )
        ),
        modal&&e(Modal,{modal:modal,offices:offices,setModal:setModal,addOffice:addOffice,addTask:addTask,updateTaskRec:updateTaskRec,editTaskDef:editTaskDef}),
        toast&&e(Toast,{message:toast.msg,type:toast.type,onClose:function(){setToast(null);}})
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  };
})();
</script>

</body>
</html>
